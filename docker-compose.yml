services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskman
      POSTGRES_PASSWORD: taskman
      POSTGRES_DB: taskman
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskman -d taskman"]
      interval: 3s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      ConnectionStrings__Db: "Host=db;Database=taskman;Username=taskman;Password=taskman"
      ASPNETCORE_URLS: "http://+:8080"
    ports: ["8080:8080"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: ../Dockerfile.web
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8080/api/v1"
    ports: ["3000:3000"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
